<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StudyBuddy</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Welcome Back!</h1>
            <p>Login to your StudyBuddy account</p>

            <div id="loginAlert" class="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="student@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>

                <div style="text-align: right; margin-bottom: 16px;">
                    <a href="#" id="forgotPassword" class="link-text">Forgot Password?</a>
                </div>

                <button type="submit" class="btn" id="loginBtn">Login</button>
            </form>

            <div style="margin-top: 24px;">
                <p>Don't have an account? <a href="signup.html" class="link-text">Sign up here</a></p>
            </div>
        </div>
    </div>

    <!-- Firebase Scripts (Modular Version) -->
    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - StudyBuddy</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Create Account</h1>
            <p>Join StudyBuddy to start organizing your studies</p>
            
            <div id="signupAlert" class="alert"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required placeholder="Ali Raza">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="student@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="•••••••• (Min 6 chars)">
                </div>

                <button type="submit" class="btn" id="signupBtn">Sign Up</button>
            </form>
            
            <div style="margin-top: 24px;">
                <p>Already have an account? <a href="login.html" class="link-text">Login here</a></p>
            </div>
        </div>
    </div>

    <!-- Firebase Scripts (Modular Version) -->
    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
